<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Загрузка из файла</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f9; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; display: inline-block; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        img { max-width: 100%; height: auto; border-radius: 10px; margin-bottom: 15px; border: 1px solid #ddd; }
        .btn { 
            display: block; 
            padding: 12px; 
            background: #007bff; 
            color: white; 
            text-decoration: none; 
            border-radius: 8px; 
            font-weight: bold; 
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Ваша таблица</h2>
        
        <img src="1.png" alt="Файл 1.png не найден в папке">

        <a href="1.png" download="my_table.png" class="btn">
            Скачать таблицу 📥
        </a>
    </div>

</body>
</html>
